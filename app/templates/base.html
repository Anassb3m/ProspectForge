<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0B0F19] antialiased">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ProspectForge{% endblock %}</title>

  <link rel="stylesheet" type="text/css" href="/static/css/phosphor-icons/regular/style.css" />
  <link rel="stylesheet" href="/static/css/app.css" />
  <script src="/static/js/htmx.min.js" defer></script>
  <script src="/static/js/alpine.min.js" defer></script>
  <script src="/static/js/app.js" defer></script>

  {% block head %}{% endblock %}
</head>
<body class="h-full font-sans selection:bg-brand-500/30 selection:text-white relative overflow-hidden">

  <!-- Ambient Background Orbs -->
  <div class="absolute top-0 -left-40 w-96 h-96 bg-indigo-500 rounded-full mix-blend-screen filter blur-[128px] opacity-20 animate-blob pointer-events-none"></div>
  <div class="absolute top-0 -right-40 w-96 h-96 bg-purple-500 rounded-full mix-blend-screen filter blur-[128px] opacity-20 animate-blob animation-delay-2000 pointer-events-none"></div>
  <div class="absolute -bottom-40 left-20 w-96 h-96 bg-emerald-500 rounded-full mix-blend-screen filter blur-[128px] opacity-10 animate-blob animation-delay-4000 pointer-events-none"></div>

  {% if user is defined and user %}
  <div x-data="{ sidebarOpen: false }" class="flex h-full relative z-10 p-2 md:p-4 gap-4">

    <!-- Mobile Header & Toggle -->
    <div class="md:hidden absolute top-4 left-4 right-4 z-50 flex items-center justify-between p-4 rounded-2xl bg-surface-50 backdrop-blur-xl border border-surface-border shadow-lg">
      <div class="flex items-center gap-3 text-lg font-bold text-white">
        <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 text-white">
          <i class="ph ph-lightning text-xl"></i>
        </div>
        ProspectForge
      </div>
      <button @click="sidebarOpen = !sidebarOpen" class="text-slate-300 hover:text-white p-2">
        <i class="ph ph-list text-2xl"></i>
      </button>
    </div>

    <!-- Sidebar Wrapper -->
    <div :class="sidebarOpen ? 'translate-x-0' : '-translate-x-[150%]'" class="fixed inset-y-4 left-4 z-40 transition-transform duration-300 md:relative md:inset-0 md:translate-x-0">
      {% include "partials/nav.html" %}
    </div>

    <!-- Overlay for mobile -->
    <div x-show="sidebarOpen" @click="sidebarOpen = false" x-transition.opacity class="fixed inset-0 bg-black/50 z-30 md:hidden" style="display: none;"></div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full min-w-0 overflow-hidden rounded-2xl bg-surface-50 backdrop-blur-xl border border-surface-border shadow-2xl mt-20 md:mt-0">
      <div class="flex-1 overflow-y-auto relative">
        <div class="w-full h-full p-4 sm:p-6 md:p-8 lg:p-10">
          {% block content %}{% endblock %}
        </div>
      </div>
    </main>

  </div>
  {% else %}
    {% block guest %}{% endblock %}
  {% endif %}
  {% block scripts %}{% endblock %}
</body>
</html>
