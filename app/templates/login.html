{% extends "base.html" %}
{% block title %}Log in — ProspectForge{% endblock %}
{% block guest %}
<div class="flex min-h-full flex-col justify-center items-center py-12 px-4 sm:px-6 lg:px-8 bg-[#f9f9f8]">
  <div class="w-full max-w-sm space-y-8">
    <div class="text-center">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded bg-notion-text text-xl font-bold text-white shadow-sm mb-4">PF</div>
      <h2 class="text-2xl font-bold tracking-tight text-notion-text">Log in</h2>
      <p class="mt-2 text-sm text-notion-gray">ProspectForge OS</p>
    </div>
    
    <div class="card p-6 shadow-sm">
      {% if error %}
      <div class="mb-4 rounded bg-[#ffebe6] px-3 py-2 text-sm font-medium text-[#c03426] border border-[#ffdbd1]">{{ error }}</div>
      {% endif %}
      
      <form action="/auth/login/form" method="post" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-semibold text-notion-text mb-1">Email</label>
          <input id="email" name="email" type="email" required value="{{ email or '' }}" class="input-field" autocomplete="username" />
        </div>
        <div>
          <label for="password" class="block text-sm font-semibold text-notion-text mb-1">Password</label>
          <input id="password" name="password" type="password" required class="input-field" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-primary w-full justify-center text-sm py-2 mt-4">Continue</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
