{% extends "blank.html" %}
{% block title %}Log in — ProspectForge{% endblock %}
{% block body %}
<div class="flex min-h-full flex-col justify-center items-center py-12 px-4 sm:px-6 lg:px-8 bg-[#0B0F19]">
  <div class="w-full max-w-sm space-y-8 relative z-10">
    <div class="text-center">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded bg-gradient-to-br from-indigo-500 to-purple-600 text-xl font-bold text-white shadow-sm mb-4">
        <i class="ph ph-lightning text-2xl"></i>
      </div>
      <h2 class="text-2xl font-bold tracking-tight text-slate-100">Log in</h2>
      <p class="mt-2 text-sm text-slate-400">ProspectForge OS</p>
    </div>

    <div class="bg-surface-50 p-6 shadow-xl border border-surface-border rounded-xl backdrop-blur-sm">
      {% if error %}
      <div class="mb-4 rounded bg-red-500/10 px-3 py-2 text-sm font-medium text-red-400 border border-red-500/20">{{ error }}</div>
      {% endif %}

      <form action="/auth/login/form" method="post" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-semibold text-slate-300 mb-1">Email</label>
          <input id="email" name="email" type="email" required value="{{ email or '' }}" class="w-full bg-surface-100 border border-surface-border text-white px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 transition-shadow" autocomplete="username" />
        </div>
        <div>
          <label for="password" class="block text-sm font-semibold text-slate-300 mb-1">Password</label>
          <input id="password" name="password" type="password" required class="w-full bg-surface-100 border border-surface-border text-white px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 transition-shadow" autocomplete="current-password" />
        </div>
        <button type="submit" class="w-full bg-brand-600 hover:bg-brand-500 text-white font-semibold py-2 px-4 rounded-lg transition-colors mt-4">Continue</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
