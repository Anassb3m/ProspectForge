# ProspectForge — multi-tenant VPS friendly (custom ports, no fight for 80/443)
#
#   cp .env.production.example .env   # set DOMAIN, secrets, ports
#   ./scripts/deploy.sh
#
# Default host ports (override in .env):
#   HTTP_PORT=18080   HTTPS_PORT=18443   APP_PORT=18081   POSTGRES_PORT=15432

services:
  app:
    build: .
    image: prospectforge:latest
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-prospectforge}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-prospectforge}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-false}
      ENABLE_NIGHTLY_INGESTION: ${ENABLE_NIGHTLY_INGESTION:-false}
      REACHER_URL: http://reacher:8080
      REACHER_ENABLED: ${REACHER_ENABLED:-false}
      DECP_CACHE_PATH: /app/data/decp_cache.parquet
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-127.0.0.1}
      # Cookie Secure only when you terminate TLS in front of the app
      FORCE_HTTPS_COOKIES: ${FORCE_HTTPS_COOKIES:-false}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-*}
    depends_on:
      db:
        condition: service_healthy
    # Loopback only — never bind app on 0.0.0.0
    ports:
      - "127.0.0.1:${APP_PORT:-18081}:8000"
    restart: unless-stopped
    volumes:
      - app_data:/app/data
      - app_backups:/app/backups
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prospectforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-prospectforge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prospectforge} -d ${POSTGRES_DB:-prospectforge}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    # Loopback only, non-default host port to avoid clashing with another Postgres
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-15432}:5432"
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Edge proxy on CUSTOM host ports (defaults 18080 / 18443 — not 80/443)
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-18080}:18080"
      - "${HTTPS_PORT:-18443}:18443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@localhost}
      HTTP_PORT: ${HTTP_PORT:-18080}
      HTTPS_PORT: ${HTTPS_PORT:-18443}
      # internal = self-signed (works on any port)
      # off     = plain HTTP only on HTTP_PORT (put your own TLS proxy in front)
      # acme    = Let's Encrypt (needs public :80 reachable OR DNS challenge)
      TLS_MODE: ${TLS_MODE:-internal}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  reacher:
    image: reacherhq/backend:latest
    profiles: ["reacher"]
    restart: unless-stopped
    networks:
      - internal

  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    env_file: .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-prospectforge}
      POSTGRES_DB: ${POSTGRES_DB:-prospectforge}
    volumes:
      - app_backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "/backup.sh"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

volumes:
  pgdata:
  app_data:
  app_backups:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
