# ProspectForge production stack — trusted ACME, external proxy, or internal CA.
#
#   cp .env.production.example .env   # set DOMAIN, secrets, ports
#   ./scripts/deploy.sh
#
# Host ports are selected by scripts/configure-production.sh.

services:
  app:
    build: .
    image: ${APP_IMAGE:-prospectforge:latest}
    env_file: ${ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-prospectforge}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-prospectforge}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-false}
      ENABLE_NIGHTLY_INGESTION: ${ENABLE_NIGHTLY_INGESTION:-false}
      REACHER_URL: http://reacher:8080
      REACHER_ENABLED: ${REACHER_ENABLED:-false}
      DECP_CACHE_PATH: /app/data/decp_cache.parquet
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      # The app is reachable only through loopback or the private compose network.
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-*}
      FORCE_HTTPS_COOKIES: ${FORCE_HTTPS_COOKIES:-true}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:?Set TRUSTED_HOSTS in .env}
      TLS_MODE: ${TLS_MODE:-internal}
    depends_on:
      db:
        condition: service_healthy
    # Loopback only — never bind app on 0.0.0.0
    ports:
      - "127.0.0.1:${APP_PORT:-18081}:8000"
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 30s
    volumes:
      - app_data:/app/data
      - app_backups:/app/backups
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/ready"]
      interval: ${APP_HEALTH_INTERVAL:-30s}
      timeout: 5s
      start_period: ${APP_HEALTH_START_PERIOD:-45s}
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prospectforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-prospectforge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prospectforge} -d ${POSTGRES_DB:-prospectforge}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    # PostgreSQL stays private to the compose network. Use `docker compose exec db`
    # for administration and backups.
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Edge proxy. Host ports and the mode-specific Caddyfile come from .env.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_BIND:-0.0.0.0}:${HTTP_PORT:-18080}:80"
      - "${CADDY_BIND:-0.0.0.0}:${HTTPS_PORT:-18443}:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@localhost}
      HTTP_PORT: ${HTTP_PORT:-18080}
      HTTPS_PORT: ${HTTPS_PORT:-18443}
      # internal = self-signed (works on any port)
      # off     = plain HTTP only on HTTP_PORT (put your own TLS proxy in front)
      # acme    = Let's Encrypt (needs public :80 reachable OR DNS challenge)
      TLS_MODE: ${TLS_MODE:-internal}
    volumes:
      - ${CADDYFILE_PATH:-./deploy/Caddyfile.internal}:/etc/caddy/Caddyfile:ro,Z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  reacher:
    image: ${REACHER_IMAGE:-reacherhq/backend:v0.11.7}
    profiles: ["reacher"]
    restart: unless-stopped
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    env_file: ${ENV_FILE:-.env}
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-prospectforge}
      POSTGRES_DB: ${POSTGRES_DB:-prospectforge}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    volumes:
      - app_backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro,Z
    entrypoint: ["/bin/sh", "/backup.sh"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  # Disposable integration-test database. Never enabled by production deploy scripts.
  test-db:
    image: postgres:16-alpine
    profiles: ["test"]
    environment:
      POSTGRES_USER: prospectforge_test
      POSTGRES_PASSWORD: test-only-password
      POSTGRES_DB: prospectforge_test
    ports:
      - "127.0.0.1:${TEST_DB_PORT:-55439}:5432"
    tmpfs:
      - /var/lib/postgresql/data:size=512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prospectforge_test -d prospectforge_test"]
      interval: 2s
      timeout: 3s
      retries: 20
    networks:
      - internal

volumes:
  pgdata:
  app_data:
  app_backups:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
