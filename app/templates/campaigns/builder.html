{% extends "base.html" %}
{% block title %}New Campaign — ProspectForge{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto">
  <div class="mb-8">
    <a href="/campaigns" class="text-indigo-400 hover:text-indigo-300 text-sm font-medium mb-4 inline-block">&larr; Back to Campaigns</a>
    <h1 class="text-3xl font-bold text-white tracking-tight">Campaign Builder</h1>
    <p class="mt-2 text-slate-400">Configure your outreach campaign</p>
  </div>

  <div class="bg-surface-0 rounded-2xl border border-surface-border shadow-xl overflow-hidden p-8">
    <form action="/campaigns/new" method="POST" class="space-y-6">
      
      <div>
        <label for="name" class="block text-sm font-bold text-slate-300 mb-2">Campaign Name</label>
        <input type="text" id="name" name="name" required class="w-full bg-surface-50 border border-surface-border rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" placeholder="e.g. Q3 CTO Outreach">
      </div>

      <div>
        <label for="play_version_id" class="block text-sm font-bold text-slate-300 mb-2">Market Play</label>
        <select id="play_version_id" name="play_version_id" required class="w-full bg-surface-50 border border-surface-border rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors appearance-none">
          {% for play in plays %}
            <option value="{{ play.id }}">{{ play.code }} (v{{ play.version }})</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label for="daily_send_cap" class="block text-sm font-bold text-slate-300 mb-2">Daily Send Cap</label>
        <input type="number" id="daily_send_cap" name="daily_send_cap" value="20" min="1" max="1000" class="w-full bg-surface-50 border border-surface-border rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
        <p class="mt-2 text-xs text-slate-500">Maximum number of touches per day to protect domain reputation.</p>
      </div>

      <div class="pt-6 border-t border-surface-border flex justify-end gap-4">
        <a href="/campaigns" class="btn-secondary">Cancel</a>
        <button type="submit" class="btn-primary">Create Campaign</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
